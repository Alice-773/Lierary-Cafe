<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excluir Livro — The Literary Cafe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        .font-serif-cozy { font-family: 'Fraunces', serif; }
        .font-sans-cozy { font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: #FBF7F0; color: #2C1810; }
    </style>
</head>
<body class="font-sans-cozy min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-[#FDFBF7] border border-[#E6DEC9] rounded-2xl p-8 shadow-sm text-center transition-all hover:shadow-md">
        
        <div class="inline-flex items-center justify-center w-16 h-16 bg-[#6F4E37]/10 rounded-full text-3xl mb-5 text-[#6F4E37]">
            ⚠️
        </div>

        <h1 class="font-serif-cozy text-2xl font-bold text-[#2C1810] mb-3">
            Confirmar Exclusão
        </h1>

        <p class="text-[#2C1810]/70 text-sm leading-relaxed mb-6">
            Você está prestes a remover permanentemente a obra 
            <span class="font-semibold text-[#2C1810] block text-base italic mt-2 bg-[#F5DEB3]/30 px-3 py-1.5 rounded-lg border border-[#D4A574]/20">
                "{{ livro.titulo }}"
            </span>
            do acervo da sua biblioteca. Esta ação não poderá ser desfeita.
        </p>

        <form method="POST" class="space-y-3">
            {% csrf_token %}
            
            <button type="submit" 
                    class="w-full py-3 bg-[#6F4E37] text-white font-medium rounded-xl shadow-sm hover:bg-[#2C1810] active:scale-[0.98] transition-all tracking-wide">
                Sim, Confirmar Exclusão
            </button>
            
            <a href="{% url 'lista_livros' %}" 
               class="block w-full py-3 bg-transparent hover:bg-[#F4EFE6] border border-[#E6DEC9] text-[#2C1810]/80 hover:text-[#2C1810] font-medium rounded-xl transition-all text-sm">
                Cancelar e Voltar
            </a>
        </form>

        <div class="mt-8 pt-4 border-t border-[#E6DEC9]/60 text-[11px] text-[#2C1810]/40 flex items-center justify-center gap-1">
            <span>☕</span> Literary Cafe • Gerenciamento Seguro
        </div>

    </div>

</body>
</html>
